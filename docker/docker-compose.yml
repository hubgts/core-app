services:
  db:
    image: postgres:16-alpine
    container_name: progression-db
    environment:
      - POSTGRES_USER=progression
      - POSTGRES_PASSWORD=progression
      - POSTGRES_DB=progression
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U progression -d progression"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: progression-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=progression
      - DB_PASSWORD=progression
      - DB_NAME=progression
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  frontend:
    # (le frontend reste sans persistance)
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: progression-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  db_data:
