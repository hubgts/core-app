# Configuration de PRODUCTION.
# Isolée du dev : nom de projet, conteneurs et volume dédiés (suffixe -prod),
# secrets chargés depuis docker/.env.prod (--env-file).
#
#   docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod up -d --build
#   (ou : make prod-up / make prod-build — voir Makefile)
name: core-app-prod

services:
  db:
    image: postgres:16-alpine
    container_name: core-app-prod-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    # Pas de port exposé sur l'hôte : la base reste accessible uniquement
    # depuis le réseau interne Docker.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    container_name: core-app-prod-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    # Pas de port exposé : le backend est joint uniquement par nginx (front)
    # via le réseau interne.
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3000']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        # Même origine : le front appelle /api, proxifié par nginx vers le back.
        VITE_API_URL: /api
    container_name: core-app-prod-frontend
    restart: unless-stopped
    # Pas de port exposé sur l'hôte : nginx n'est joint que par Caddy via le
    # réseau interne. L'entrée publique (80/443 + TLS) est gérée par Caddy.
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:80']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    container_name: core-app-prod-caddy
    restart: unless-stopped
    # Seul service exposé publiquement : 80 (redirection + validation Let's
    # Encrypt) et 443 (HTTPS). Caddy obtient et renouvelle le certificat seul.
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certificats — À CONSERVER entre redémarrages
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started

volumes:
  db_data_prod:
  caddy_data:
  caddy_config:
