# Configuration nginx système (installation native, sans Docker).
# Sert le build du frontend en statique et proxifie /api vers le backend NestJS.
# Le TLS (443) est ajouté automatiquement par certbot --nginx.
#
# Installation :
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/core-app
#   sudo ln -sf /etc/nginx/sites-available/core-app /etc/nginx/sites-enabled/core-app
#   sudo rm -f /etc/nginx/sites-enabled/default        # retire le site par défaut
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d emiliengantois.fr -d www.emiliengantois.fr

server {
    listen 80;
    listen [::]:80;
    server_name emiliengantois.fr www.emiliengantois.fr;

    # Build statique du frontend (déployé via `make prod-frontend`).
    root /var/www/core-app;
    index index.html;

    # Mot de passe d'accès au site (fichier créé avec htpasswd, hors dépôt) :
    #   sudo htpasswd -c /etc/nginx/.htpasswd egantois
    auth_basic "Accès restreint";
    auth_basic_user_file /etc/nginx/.htpasswd;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API NestJS (préfixe /api retiré : /api/habits -> 127.0.0.1:3000/habits).
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache long pour les assets fingerprintés par Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : tout le reste retombe sur index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
